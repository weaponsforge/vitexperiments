name: Bug Report
description: Create a bug report
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue:

        - Do a search of existing issues.
        - Pull the latest updates from this repository's `dev` branch.

  - type: textarea
    attributes:
      label: To Reproduce
      description: A step-by-step description of how to reproduce the issue, or a link to the reproducible repository.
      placeholder: |
        1. Start the application in development (npm run dev)
        2. Click X
        3. Y will happen
    validations:
      required: true

  - type: textarea
    attributes:
      label: Current vs. Expected behavior
      description: A clear and concise description of what the bug is, and what you expected to happen.
      placeholder: 'Following the steps from the previous section, I expected A to happen, but I observed B instead'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Provide environment information
      description: Please run `npm run info` in the `/app` directory of your project and paste the results.
      render: bash
      placeholder: |
        Platform: (eg., Linux, Windows, etc)
        Node version: v24.11.0
        Platform: win32
        Arch: x64
        V8 version: 13.6.233.10-node.28
        npm version: 11.6.1
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Which area(s) are affected? (Select all that apply)
      multiple: true
      options:
        - 'Not sure'
        - 'React'
        - 'CSS Styling'
        - 'Testing'
        - 'Docker'
        - 'Others'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: |
        Any extra information that might help us investigate.
      placeholder: |
        I tested my reproduction against different Vite releases, and the first one that introduced the bug was "v8.0.2", since reverting to "v6.3.1" works.
